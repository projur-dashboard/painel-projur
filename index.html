<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PROJUR IPSEM | Dashboard Oficial</title>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0f1117; --bg2: #161b27; --border: rgba(255,255,255,0.08);
            --text: #e8eaf0; --text-dim: #8b92a8;
            --c-jos: #4f8ef7; --c-jul: #34d399; --c-jun: #a78bfa; --c-raf: #fb923c;
        }
        body { font-family: 'IBM Plex Sans', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 0; }
        .container { max-width: 1100px; margin: 0 auto; padding: 20px; }
        
        /* HEADER & TABS */
        header { display: flex; justify-content: space-between; align-items: center; padding: 20px 0; border-bottom: 1px solid var(--border); margin-bottom: 20px; }
        .nav-tabs { display: flex; gap: 10px; margin-bottom: 30px; }
        .tab-btn { background: var(--bg2); border: 1px solid var(--border); color: var(--text-dim); padding: 12px 24px; border-radius: 8px; cursor: pointer; font-weight: 600; transition: 0.3s; }
        .tab-btn.active { background: var(--c-jul); color: #000; border-color: var(--c-jul); }

        /* CARDS ESTATÍSTICOS (VISÃO GERAL) */
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 15px; margin-bottom: 30px; }
        .stat-card { background: var(--bg2); padding: 25px; border-radius: 12px; border: 1px solid var(--border); }
        .stat-val { font-size: 36px; font-weight: 600; display: block; color: var(--c-jul); }
        .stat-label { font-size: 12px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 1px; }

        /* DISTRIBUIÇÃO POR ADVOGADO */
        .dist-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 15px; margin-bottom: 40px; }
        .adv-box { background: var(--bg2); padding: 20px; border-radius: 12px; border-top: 4px solid #555; }
        .bar-container { height: 8px; background: rgba(255,255,255,0.05); border-radius: 4px; margin: 10px 0; overflow: hidden; }
        .bar-fill { height: 100%; border-radius: 4px; transition: width 1s ease-in-out; }

        /* AGENDA RECOLHÍVEL (ACORDEÃO) */
        .day-group { background: var(--bg2); border: 1px solid var(--border); border-radius: 10px; margin-bottom: 12px; overflow: hidden; }
        .day-hdr { padding: 18px 25px; display: flex; justify-content: space-between; cursor: pointer; background: rgba(255,255,255,0.02); }
        .day-hdr:hover { background: rgba(255,255,255,0.05); }
        .day-content { display: none; padding: 20px; border-top: 1px solid var(--border); }
        .proc-item { padding: 12px 0; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .proc-item:last-child { border-bottom: none; }
        .badge { font-size: 10px; padding: 3px 8px; border-radius: 4px; color: #fff; margin-right: 10px; font-weight: 700; text-transform: uppercase; }

        #loading { text-align: center; padding: 100px; font-size: 20px; color: var(--text-dim); }
        .hidden { display: none; }
    </style>
</head>
<body>

<div class="container">
    <header>
        <div>
            <h1 style="margin:0; font-size:26px;">PROJUR <span style="color:var(--c-jul)">IPSEM</span></h1>
            <small id="update-time" style="color:var(--text-dim)"></small>
        </div>
        <div style="text-align:right">
            <span id="total-prazos-top" style="font-size:32px; font-weight:600; color:var(--c-jul)">0</span><br>
            <small style="font-size:10px; letter-spacing:1px">PRAZOS FUTUROS</small>
        </div>
    </header>

    <div class="nav-tabs">
        <button class="tab-btn active" onclick="switchTab('agenda', this)">Agenda de Prazos</button>
        <button class="tab-btn" onclick="switchTab('estatisticas', this)">Visão Geral & Distribuição</button>
    </div>

    <div id="loading">Sincronizando com Google Sheets...</div>

    <div id="tab-agenda" class="tab-content">
        <div id="agenda-lista"></div>
    </div>

    <div id="tab-estatisticas" class="tab-content hidden">
        <div class="stats-grid">
            <div class="stat-card"><span class="stat-label">Total de Processos</span><span class="stat-val" id="val-total">---</span></div>
            <div class="stat-card"><span class="stat-label">Com Prazos</span><span class="stat-val" id="val-prazos">---</span></div>
            <div class="stat-card"><span class="stat-label">Judiciais</span><span class="stat-val" id="val-judicial">---</span></div>
            <div class="stat-card"><span class="stat-label">TCE / Outros</span><span class="stat-val" id="val-tce">---</span></div>
        </div>
        <h3 style="margin-bottom:20px; font-size:14px; color:var(--text-dim); text-transform:uppercase">Carga de Trabalho por Advogado</h3>
        <div class="dist-grid" id="adv-dist"></div>
    </div>
</div>

<script>
    const API = "https://script.google.com/macros/s/AKfycbwHMhqcltmxQil4TbSIejrc-cDbne5Q7Jlt8ZM_scAPaksUz1k-UE6GL72B1DKnO57v/exec?t=" + new Date().getTime();
    const CORES = { JOSINALDO: '#4f8ef7', JULIANA: '#34d399', JULIANNE: '#a78bfa', RAFAELLE: '#fb923c' };
    
    async function fetchData() {
        try {
            const res = await fetch(API);
            const data = await res.json();
            renderDashboard(data);
        } catch (e) {
            document.getElementById('loading').innerText = "Erro ao carregar dados. Verifique a API.";
        }
    }

    function renderDashboard(data) {
        document.getElementById('loading').classList.add('hidden');
        document.getElementById('update-time').innerText = "Atualizado em: " + data.geradoEm;
        document.getElementById('total-prazos-top').innerText = data.comPrazo;
        
        // Stats Visão Geral
        document.getElementById('val-total').innerText = "465"; // Valor fixo da sua imagem ou use data.total se tiver
        document.getElementById('val-prazos').innerText = data.comPrazo;
        document.getElementById('val-judicial').innerText = "222"; 
        document.getElementById('val-tce').innerText = "35";

        // Render Agenda (Acordeão)
        const lista = document.getElementById('agenda-lista');
        lista.innerHTML = '';
        data.agenda.forEach(dia => {
            const dataFormatada = dia.date.split('-').reverse().join('/');
            let procsHtml = "";
            let totalDia = 0;

            Object.keys(dia.advs).forEach(adv => {
                dia.advs[adv].forEach(p => {
                    totalDia++;
                    procsHtml += `
                        <div class="proc-item">
                            <span class="badge" style="background:${CORES[adv] || '#555'}">${adv}</span>
                            <strong style="font-size:15px">${p.nome}</strong><br>
                            <small style="color:var(--text-dim)">${p.proc} • ${p.tipo}</small>
                            <div style="color:var(--c-jul); margin-top:8px; font-size:13px; border-left:2px solid var(--c-jul); padding-left:10px">${p.obs}</div>
                        </div>`;
                });
            });

            lista.innerHTML += `
                <div class="day-group">
                    <div class="day-hdr" onclick="toggle(this)">
                        <span>📅 ${dataFormatada}</span>
                        <span style="color:var(--text-dim)">${totalDia} PRAZOS ▾</span>
                    </div>
                    <div class="day-content">${procsHtml}</div>
                </div>`;
        });

        // Render Distribuição Advogados
        const distCont = document.getElementById('adv-dist');
        Object.keys(CORES).forEach(adv => {
            const qtd = data.porAdv[adv] || 0;
            const perc = (qtd / 150) * 100; // Baseado em uma média de 150 processos
            distCont.innerHTML += `
                <div class="adv-box" style="border-top-color:${CORES[adv]}">
                    <div style="display:flex; justify-content:space-between">
                        <strong>${adv}</strong>
                        <span style="color:${CORES[adv]}">${qtd}</span>
                    </div>
                    <div class="bar-container"><div class="bar-fill" style="width:${perc}%; background:${CORES[adv]}"></div></div>
                    <small style="color:var(--text-dim)">Volume de processos ativos</small>
                </div>`;
        });
    }

    function toggle(el) {
        const content = el.nextElementSibling;
        content.style.display = (content.style.display === 'block') ? 'none' : 'block';
    }

    function switchTab(tab, btn) {
        document.querySelectorAll('.tab-content').forEach(c => c.classList.add('hidden'));
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById('tab-' + tab).classList.remove('hidden');
        btn.classList.add('active');
    }

    fetchData();
</script>
</body>
</html>
