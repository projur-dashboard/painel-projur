<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PROJUR/IPSEM — Dashboard 2026 (Live)</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
    <style>
        :root {
            --bg: #0f1117;
            --bg2: #161b27;
            --bg3: #1e2535;
            --border: rgba(255, 255, 255, 0.07);
            --text: #e8eaf0;
            --text2: #8b92a8;
            --text3: #555d72;
            --c-jos: #4f8ef7;
            --c-jul: #34d399;
            --c-jun: #a78bfa;
            --c-raf: #fb923c;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'IBM Plex Sans', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            font-size: 14px;
            line-height: 1.6;
            overflow-x: hidden;
        }

        header {
            border-bottom: 1px solid var(--border);
            padding: 0 28px;
            display: flex;
            align-items: center;
            gap: 16px;
            height: 52px;
            position: sticky;
            top: 0;
            background: rgba(15, 17, 23, 0.94);
            backdrop-filter: blur(10px);
            z-index: 100;
        }

        .logo-mark {
            font-family: 'IBM Plex Mono', monospace;
            font-size: 11px;
            font-weight: 500;
            letter-spacing: .12em;
            color: var(--c-jos);
            text-transform: uppercase;
            border: 1px solid var(--c-jos);
            padding: 3px 8px;
            border-radius: 4px;
        }

        .hdr-title { font-size: 13px; color: var(--text2); flex: 1; }
        #last-update { font-family: 'IBM Plex Mono', monospace; font-size: 11px; color: var(--text3); }

        main { padding: 24px 28px; max-width: 1280px; margin: 0 auto; }

        .slabel {
            font-family: 'IBM Plex Mono', monospace;
            font-size: 10px;
            letter-spacing: .15em;
            text-transform: uppercase;
            color: var(--text3);
            margin-bottom: 10px;
            margin-top: 24px;
        }

        .metrics-row {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 12px;
            margin-bottom: 4px;
        }

        .metric {
            background: var(--bg2);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 16px 18px;
            position: relative;
        }

        .metric::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; height: 2px;
            border-radius: 10px 10px 0 0;
        }

        .m-blue::before { background: var(--c-jos); }
        .m-green::before { background: var(--c-jul); }
        .m-purple::before { background: var(--c-jun); }
        .m-orange::before { background: var(--c-raf); }

        .metric-lbl { font-size: 11px; color: var(--text3); margin-bottom: 6px; font-family: 'IBM Plex Mono', monospace; }
        .metric-val { font-size: 30px; font-weight: 600; line-height: 1; color: var(--text); }

        .adv-row {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 12px;
        }

        .adv-card {
            background: var(--bg2);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 16px;
            transition: transform 0.2s;
        }

        .adv-name { font-size: 13px; font-weight: 500; display: flex; align-items: center; gap: 8px; margin-bottom: 12px; }
        .adv-dot { width: 8px; height: 8px; border-radius: 50%; }
        .adv-n { font-size: 26px; font-weight: 600; margin-bottom: 4px; }
        .adv-nsub { font-size: 11px; color: var(--text3); margin-bottom: 15px; }

        .charts-row {
            display: grid;
            grid-template-columns: 1.5fr 1fr;
            gap: 12px;
            margin-top: 12px;
        }

        .chart-card {
            background: var(--bg2);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 20px;
        }

        @media (max-width: 900px) { .charts-row { grid-template-columns: 1fr; } }

        .day-block {
            background: var(--bg2);
            border: 1px solid var(--border);
            border-radius: 10px;
            margin-bottom: 8px;
            overflow: hidden;
        }

        .day-hdr {
            padding: 12px 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            cursor: pointer;
            background: rgba(255,255,255,0.02);
        }

        .day-hdr:hover { background: var(--bg3); }

        .day-body { display: none; padding: 0 16px 12px 16px; border-top: 1px solid var(--border); }
        .day-body.open { display: block; }

        .proc-item {
            padding: 10px 0;
            border-bottom: 1px solid var(--border);
        }

        .proc-item:last-child { border-bottom: none; }
        .proc-nome { font-size: 13px; font-weight: 500; color: #fff; }
        .proc-meta { font-size: 11px; color: var(--text3); font-family: 'IBM Plex Mono', monospace; margin-top: 4px; }
        .badge-tipo {
            background: var(--bg3);
            color: var(--text2);
            padding: 2px 6px;
            border-radius: 4px;
            font-size: 10px;
            margin-left: 8px;
        }
    </style>
</head>
<body>

<header>
    <div class="logo-mark">PROJUR</div>
    <div class="hdr-title">IPSEM Dashboard 2026 — Gestão de Processos</div>
    <div id="last-update">Sincronizando...</div>
</header>

<main>
    <div class="slabel">Métricas Gerais</div>
    <div class="metrics-row">
        <div class="metric m-blue">
            <div class="metric-lbl">Total Geral</div>
            <div class="metric-val" id="m-total">...</div>
        </div>
        <div class="metric m-green">
            <div class="metric-lbl">Prazos Ativos</div>
            <div class="metric-val" id="m-prazo">...</div>
        </div>
        <div class="metric m-purple">
            <div class="metric-lbl">Judiciais</div>
            <div class="metric-val" id="m-jud">...</div>
        </div>
        <div class="metric m-orange">
            <div class="metric-lbl">Processos TCE</div>
            <div class="metric-val" id="m-tce">...</div>
        </div>
    </div>

    <div class="slabel">Distribuição por Advogado</div>
    <div class="adv-row" id="adv-cards"></div>

    <div class="charts-row">
        <div class="chart-card">
            <div class="slabel" style="margin-top:0">Volume por Tipo</div>
            <canvas id="chart-tipo" height="280"></canvas>
        </div>
        <div class="chart-card">
            <div class="slabel" style="margin-top:0">Entradas / Mês</div>
            <canvas id="chart-mes" height="280"></canvas>
        </div>
    </div>

    <div class="slabel">Agenda de Prazos</div>
    <div id="agenda-container"></div>
</main>

<script>
    // LINK DA SUA API (Garante que está como "Anyone" no Google Script)
    const API_URL = "https://script.google.com/macros/s/AKfycbwHMhqcltmxQil4TbSIejrc-cDbne5Q7Jlt8ZM_scAPaksUz1k-UE6GL72B1DKnO57v/exec";

    const COLORS = {
        'JOSINALDO': '#4f8ef7',
        'JULIANA': '#34d399',
        'JULIANNE': '#a78bfa',
        'RAFAELLE': '#fb923c'
    };

    async function loadData() {
        try {
            const response = await fetch(API_URL);
            const data = await response.json();
            renderDashboard(data);
        } catch (error) {
            document.getElementById('last-update').textContent = "Erro de conexão";
            console.error(error);
        }
    }

    function renderDashboard(data) {
        document.getElementById('m-total').textContent = data.total;
        document.getElementById('m-prazo').textContent = data.comPrazo;
        document.getElementById('m-jud').textContent = data.porTipo['JUDICIAL'] || 0;
        document.getElementById('m-tce').textContent = data.porTipo['TCE'] || 0;
        document.getElementById('last-update').textContent = "Live: " + data.geradoEm;

        // Cards de Advogados
        const advContainer = document.getElementById('adv-cards');
        advContainer.innerHTML = '';
        Object.entries(data.porAdv).sort((a,b) => b[1] - a[1]).forEach(([name, count]) => {
            const color = COLORS[name] || '#8b92a8';
            advContainer.innerHTML += `
                <div class="adv-card" style="border-top: 2px solid ${color}">
                    <div class="adv-name"><span class="adv-dot" style="background:${color}"></span>${name}</div>
                    <div class="adv-n">${count}</div>
                    <div class="adv-nsub">Processos sob responsabilidade</div>
                </div>
            `;
        });

        // Gráfico Tipos
        new Chart(document.getElementById('chart-tipo'), {
            type: 'bar',
            data: {
                labels: Object.keys(data.porTipo),
                datasets: [{
                    data: Object.values(data.porTipo),
                    backgroundColor: '#4f8ef7',
                    borderRadius: 5
                }]
            },
            options: {
                indexAxis: 'y',
                plugins: { legend: { display: false } },
                scales: {
                    x: { grid: { display: false }, ticks: { color: '#8b92a8' } },
                    y: { grid: { display: false }, ticks: { color: '#8b92a8' } }
                }
            }
        });

        // Gráfico Meses (Exemplo simples)
        new Chart(document.getElementById('chart-mes'), {
            type: 'line',
            data: {
                labels: ['Jan','Fev','Mar','Abr','Mai','Jun'],
                datasets: [{
                    data: [12, 19, 3, 5, 2, 3], // Aqui você pode mapear data.porMes se existir
                    borderColor: '#34d399',
                    tension: 0.4
                }]
            },
            options: {
                plugins: { legend: { display: false } },
                scales: {
                    x: { grid: { display: false }, ticks: { color: '#8b92a8' } },
                    y: { grid: { color: 'rgba(255,255,255,0.05)', ticks: { color: '#8b92a8' } } }
                }
            }
        });

        // Agenda
        const agendaContainer = document.getElementById('agenda-container');
        agendaContainer.innerHTML = '';
        data.agenda.forEach(item => {
            const dateParts = item.date.split('-');
            const dateFormatted = `${dateParts[2]}/${dateParts[1]}/${dateParts[0]}`;
            
            let procHtml = '';
            Object.entries(item.advs).forEach(([adv, procs]) => {
                procs.forEach(p => {
                    procHtml += `
                        <div class="proc-item">
                            <div class="proc-nome">${p.nome}</div>
                            <div class="proc-meta">
                                <span>${p.proc}</span> • <b>${adv}</b>
                                <span class="badge-tipo">${p.tipo}</span>
                            </div>
                            <div style="font-size:11px; color:#8b92a8; margin-top:5px">Obs: ${p.obs}</div>
                        </div>
                    `;
                });
            });

            agendaContainer.innerHTML += `
                <div class="day-block">
                    <div class="day-hdr" onclick="this.nextElementSibling.classList.toggle('open')">
                        <span style="font-weight:600">${dateFormatted}</span>
                        <span class="badge-tipo" style="background:rgba(79,142,247,0.1); color:#4f8ef7">Ver Detalhes</span>
                    </div>
                    <div class="day-body">
                        ${procHtml}
                    </div>
                </div>
            `;
        });
    }

    loadData();
</script>

</body>
</html>
