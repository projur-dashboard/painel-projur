<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PROJUR/IPSEM — Dashboard 2026 (Live)</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
    <style>
        :root { --bg: #0f1117; --bg2: #161b27; --bg3: #1e2535; --border: rgba(255, 255, 255, 0.07); --text: #e8eaf0; --text2: #8b92a8; --text3: #555d72; --c-jos: #4f8ef7; --c-jul: #34d399; --c-jun: #a78bfa; --c-raf: #fb923c; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'IBM Plex Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; font-size: 14px; line-height: 1.6; }
        header { border-bottom: 1px solid var(--border); padding: 0 28px; display: flex; align-items: center; gap: 16px; height: 52px; position: sticky; top: 0; background: rgba(15,17,23,0.94); backdrop-filter: blur(10px); z-index: 100; }
        .logo-mark { font-family: 'IBM Plex Mono', monospace; font-size: 11px; font-weight: 500; letter-spacing: .12em; color: var(--c-jos); text-transform: uppercase; border: 1px solid var(--c-jos); padding: 3px 8px; border-radius: 4px; }
        .hdr-title { font-size: 13px; color: var(--text2); flex: 1; }
        #last-update { font-family: 'IBM Plex Mono', monospace; font-size: 11px; color: var(--text3); }
        main { padding: 24px 28px; max-width: 1280px; margin: 0 auto; }
        .slabel { font-family: 'IBM Plex Mono', monospace; font-size: 10px; letter-spacing: .15em; text-transform: uppercase; color: var(--text3); margin-bottom: 10px; margin-top: 24px; }
        .metrics-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-bottom: 4px; }
        .metric { background: var(--bg2); border: 1px solid var(--border); border-radius: 10px; padding: 16px 18px; position: relative; }
        .metric::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px; }
        .m-blue::before { background: var(--c-jos); } .m-green::before { background: var(--c-jul); } .m-purple::before { background: var(--c-jun); } .m-orange::before { background: var(--c-raf); }
        .metric-lbl { font-size: 11px; color: var(--text3); margin-bottom: 6px; font-family: 'IBM Plex Mono', monospace; }
        .metric-val { font-size: 30px; font-weight: 600; line-height: 1; color: var(--text); }
        .adv-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
        .adv-card { background: var(--bg2); border: 1px solid var(--border); border-radius: 10px; padding: 14px 16px; }
        .adv-name { font-size: 13px; font-weight: 500; color: var(--text); display: flex; align-items: center; gap: 7px; margin-bottom: 4px; }
        .adv-dot { width: 7px; height: 7px; border-radius: 50%; }
        .adv-n { font-size: 24px; font-weight: 600; }
        .charts-row { display: grid; grid-template-columns: 1.4fr 1fr; gap: 10px; margin-top: 10px; }
        .chart-card { background: var(--bg2); border: 1px solid var(--border); border-radius: 10px; padding: 16px 18px; }
        .day-block { background: var(--bg2); border: 1px solid var(--border); border-radius: 10px; margin-bottom: 7px; overflow: hidden; }
        .day-hdr { display: flex; align-items: center; justify-content: space-between; padding: 12px 14px; cursor: pointer; }
        .day-body { display: none; padding: 10px 14px; border-top: 1px solid var(--border); background: rgba(0,0,0,0.1); }
        .day-body.open { display: block; }
        .proc-item { padding: 8px 0; border-bottom: 1px solid var(--border); }
        .proc-item:last-child { border-bottom: none; }
        @media(max-width:900px){ .metrics-row, .adv-row, .charts-row { grid-template-columns: 1fr; } }
    </style>
</head>
<body>
<header>
    <div class="logo-mark">PROJUR</div>
    <div class="hdr-title">IPSEM Dashboard 2026 — Live</div>
    <div id="last-update">Sincronizando...</div>
</header>
<main>
    <div class="slabel">Visão Geral</div>
    <div class="metrics-row">
        <div class="metric m-blue"><div class="metric-lbl">Total Geral</div><div class="metric-val" id="m-total">...</div></div>
        <div class="metric m-green"><div class="metric-lbl">Prazos</div><div class="metric-val" id="m-prazo">...</div></div>
        <div class="metric m-purple"><div class="metric-lbl">Judiciais</div><div class="metric-val" id="m-jud">...</div></div>
        <div class="metric m-orange"><div class="metric-lbl">TCE</div><div class="metric-val" id="m-tce">...</div></div>
    </div>
    <div class="slabel">Por Advogado</div>
    <div class="adv-row" id="adv-cards"></div>
    <div class="charts-row">
        <div class="chart-card"><div class="slabel" style="margin:0 0 10px">Processos por Tipo</div><canvas id="chart-tipo" height="250"></canvas></div>
        <div class="chart-card"><div class="slabel" style="margin:0 0 10px">Entradas Mensais</div><canvas id="chart-mes" height="250"></canvas></div>
    </div>
    <div class="slabel">Agenda de Prazos</div>
    <div id="agenda-container"></div>
</main>

<script>
    const API_URL = "https://script.google.com/macros/s/AKfycbwHMhqcltmxQil4TbSIejrc-cDbne5Q7Jlt8ZM_scAPaksUz1k-UE6GL72B1DKnO57v/exec";
    const COLORS = { JOSINALDO: '#4f8ef7', JULIANA: '#34d399', JULIANNE: '#a78bfa', RAFAELLE: '#fb923c' };

    async function load() {
        try {
            const r = await fetch(API_URL);
            const d = await r.json();
            
            document.getElementById('m-total').textContent = d.total;
            document.getElementById('m-prazo').textContent = d.comPrazo;
            document.getElementById('m-jud').textContent = d.porTipo['JUDICIAL'] || 0;
            document.getElementById('m-tce').textContent = d.porTipo['TCE'] || 0;
            document.getElementById('last-update').textContent = "Live: " + d.geradoEm;

            // Advogados
            const ac = document.getElementById('adv-cards'); ac.innerHTML = '';
            ['JOSINALDO', 'JULIANA', 'JULIANNE', 'RAFAELLE'].forEach(adv => {
                const n = d.porAdv[adv] || 0;
                ac.innerHTML += `<div class="adv-card" style="border-top:2px solid ${COLORS[adv]}"><div class="adv-name"><span class="adv-dot" style="background:${COLORS[adv]}"></span>${adv}</div><div class="adv-n">${n}</div></div>`;
            });

            // Gráfico Barras
            new Chart(document.getElementById('chart-tipo'), {
                type: 'bar', data: { labels: Object.keys(d.porTipo), datasets: [{ data: Object.values(d.porTipo), backgroundColor: '#4f8ef7' }] },
                options: { indexAxis: 'y', plugins: { legend: false }, scales: { x: { ticks: { color: '#8b92a8' }, grid: { display: false } }, y: { ticks: { color: '#8b92a8' }, grid: { display: false } } } }
            });

            // Agenda
            const ag = document.getElementById('agenda-container'); ag.innerHTML = '';
            d.agenda.forEach(item => {
                let procs = '';
                Object.entries(item.advs).forEach(([adv, list]) => {
                    list.forEach(p => {
                        procs += `<div class="proc-item"><b>${adv}</b> - ${p.nome} <br> <small style="color:#8b92a8">${p.proc} | ${p.obs}</small></div>`;
                    });
                });
                ag.innerHTML += `<div class="day-block"><div class="day-hdr" onclick="this.nextElementSibling.classList.toggle('open')"><span>${item.date}</span> <span>${item.total || ''} proc. ▾</span></div><div class="day-body">${procs}</div></div>`;
            });

        } catch (e) { document.getElementById('last-update').textContent = "Erro de conexão"; }
    }
    load();
</script>
</body>
</html>
