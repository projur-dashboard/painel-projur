<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PROJUR IPSEM — Dashboard Oficial</title>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0f1117; --bg2: #161b27; --border: rgba(255,255,255,0.08);
            --text: #e8eaf0; --text-dim: #8b92a8;
            --c-jos: #4f8ef7; --c-jul: #34d399; --c-jun: #a78bfa; --c-raf: #fb923c;
        }
        body { font-family: 'IBM Plex Sans', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 20px; line-height: 1.6; }
        .container { max-width: 1100px; margin: 0 auto; }
        
        header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; padding-bottom: 20px; border-bottom: 1px solid var(--border); }
        .stats-main { text-align: right; }
        .stats-count { font-size: 38px; font-weight: 600; color: var(--c-jul); display: block; line-height: 1; }
        
        .metrics { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; margin-bottom: 40px; }
        .card { background: var(--bg2); padding: 20px; border-radius: 12px; border: 1px solid var(--border); border-top: 4px solid #555; transition: 0.3s; }
        .card:hover { transform: translateY(-3px); border-color: rgba(255,255,255,0.2); }
        .card-name { font-size: 11px; color: var(--text-dim); text-transform: uppercase; font-weight: 600; letter-spacing: 1px; }
        .card-num { font-size: 32px; font-weight: 600; display: block; margin-top: 5px; }

        .filters { display: flex; gap: 10px; margin-bottom: 25px; flex-wrap: wrap; }
        .f-btn { background: var(--bg2); border: 1px solid var(--border); color: var(--text-dim); padding: 10px 20px; border-radius: 25px; cursor: pointer; font-size: 13px; transition: 0.2s; font-weight: 600; }
        .f-btn.active { background: var(--text); color: var(--bg); border-color: var(--text); }

        .day-group { background: var(--bg2); border: 1px solid var(--border); border-radius: 12px; margin-bottom: 15px; overflow: hidden; }
        .day-hdr { padding: 18px 25px; background: rgba(255,255,255,0.02); display: flex; justify-content: space-between; cursor: pointer; font-weight: 600; font-size: 16px; align-items: center; }
        .day-hdr:hover { background: rgba(255,255,255,0.05); }
        .day-content { padding: 5px 25px 20px; border-top: 1px solid var(--border); }
        
        .proc-card { padding: 15px 0; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .proc-card:last-child { border-bottom: none; }
        .badge { font-size: 10px; padding: 3px 10px; border-radius: 5px; color: #fff; margin-right: 12px; font-weight: 700; text-transform: uppercase; display: inline-block; margin-bottom: 5px; }
        .proc-nome { font-weight: 600; color: #fff; font-size: 16px; display: block; margin-bottom: 5px; }
        .proc-info { font-size: 13px; color: var(--text-dim); display: block; }
        .proc-obs { font-size: 13px; color: var(--c-jul); margin-top: 12px; border-left: 3px solid var(--c-jul); padding-left: 15px; background: rgba(52, 211, 153, 0.05); padding-top: 8px; padding-bottom: 8px; border-radius: 0 4px 4px 0; }
        
        #loading { text-align: center; padding: 120px 20px; color: var(--text-dim); font-size: 18px; }
        .spinner { border: 3px solid rgba(255,255,255,0.1); border-top: 3px solid var(--c-jul); border-radius: 50%; width: 30px; height: 30px; animation: spin 1s linear infinite; margin: 0 auto 15px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div class="container">
    <header>
        <div>
            <h1 style="margin:0; font-size:28px; letter-spacing:-1px">PROJUR Dashboard</h1>
            <span id="update-time" style="font-size:12px; color:var(--text-dim)">Acedendo aos dados do Google Sheets...</span>
        </div>
        <div class="stats-main">
            <span id="top-prazos" class="stats-count">0</span>
            <span style="font-size:10px; color:var(--text-dim); font-weight:600; letter-spacing:1.5px">PRAZOS IDENTIFICADOS</span>
        </div>
    </header>

    <div id="loading">
        <div class="spinner"></div>
        Sincronizando 263 processos...
    </div>

    <div id="main-content" style="display:none">
        <div class="metrics" id="adv-cards"></div>

        <div class="agenda-section">
            <h3 style="font-size:12px; color:var(--text-dim); text-transform:uppercase; margin-bottom:20px; letter-spacing:1px">Cronograma de Prazos</h3>
            <div class="filters" id="filter-btns">
                <button class="f-btn active" onclick="filtrar('Todos', this)">TODOS OS PRAZOS</button>
            </div>
            <div id="agenda-lista"></div>
        </div>
    </div>
</div>

<script>
    // URL DA SUA API (Verifique se é esta mesma após a "Nova Versão")
    const API_URL = "https://script.google.com/macros/s/AKfycbwHMhqcltmxQil4TbSIejrc-cDbne5Q7Jlt8ZM_scAPaksUz1k-UE6GL72B1DKnO57v/exec";
    
    const CORES = { 
        JOSINALDO: 'var(--c-jos)', 
        JULIANA: 'var(--c-jul)', 
        JULIANNE: 'var(--c-jun)', 
        RAFAELLE: 'var(--c-raf)' 
    };
    
    let dadosCache = null;

    async function carregarDashboard() {
        try {
            // O timestamp (?t=...) no final força o Google a enviar dados frescos
            const response = await fetch(`${API_URL}?t=${new Date().getTime()}`);
            dadosCache = await response.json();
            
            if (dadosCache.erro) throw new Error("Planilha vazia ou erro no Script");

            document.getElementById('loading').style.display = 'none';
            document.getElementById('main-content').style.display = 'block';
            document.getElementById('update-time').innerText = "Atualizado em: " + dadosCache.geradoEm;
            document.getElementById('top-prazos').innerText = dadosCache.comPrazo;

            renderizarCards();
            filtrar('Todos');

        } catch (erro) {
            console.error(erro);
            document.getElementById('loading').innerHTML = `
                <div style="color:#fb923c">
                    <strong>Erro na Sincronização</strong><br>
                    <small>Verifique se o Google Script foi implantado como 'Qualquer Pessoa'.</small>
                </div>`;
        }
    }

    function renderizarCards() {
        const container = document.getElementById('adv-cards');
        const filterContainer = document.getElementById('filter-btns');
        
        Object.keys(CORES).forEach(adv => {
            const qtd = dadosCache.porAdv[adv] || 0;
            container.innerHTML += `
                <div class="card" style="border-top-color: ${CORES[adv]}">
                    <span class="card-name">${adv}</span>
                    <span class="card-num">${qtd}</span>
                </div>
            `;
            filterContainer.innerHTML += `<button class="f-btn" onclick="filtrar('${adv}', this)">${adv}</button>`;
        });
    }

    function filtrar(nomeAdv, elementoBotao) {
        if (elementoBotao) {
            document.querySelectorAll('.f-btn').forEach(b => b.classList.remove('active'));
            elementoBotao.classList.add('active');
        }

        const lista = document.getElementById('agenda-lista');
        lista.innerHTML = '';

        dadosCache.agenda.forEach(itemDia => {
            let processosDoDia = [];
            
            if (nomeAdv === 'Todos') {
                Object.keys(itemDia.advs).forEach(adv => {
                    itemDia.advs[adv].forEach(p => processosDoDia.push({ ...p, advogado: adv }));
                });
            } else if (itemDia.advs[nomeAdv]) {
                itemDia.advs[nomeAdv].forEach(p => processosDoDia.push({ ...p, advogado: nomeAdv }));
            }

            if (processosDoDia.length > 0) {
                const dataFormatada = itemDia.date.split('-').reverse().join('/');
                const htmlProcessos = processosDoDia.map(p => `
                    <div class="proc-card">
                        <span class="badge" style="background:${CORES[p.advogado] || '#555'}">${p.advogado}</span>
                        <span class="proc-nome">${p.nome || 'NOME NÃO INFORMADO'}</span>
                        <span class="proc-info"><strong>Proc:</strong> ${p.proc} • <strong>Tipo:</strong> ${p.tipo}</span>
                        <div class="proc-obs"> ${p.obs}</div>
                    </div>
                `).join('');

                lista.innerHTML += `
                    <div class="day-group">
                        <div class="day-hdr" onclick="toggleDia(this)">
                            <span>📅 ${dataFormatada}</span>
                            <span style="font-size:11px; opacity:0.6; font-weight:400">${processosDoDia.length} PRAZOS ▾</span>
                        </div>
                        <div class="day-content">${htmlProcessos}</div>
                    </div>`;
            }
        });
    }

    function toggleDia(elemento) {
        const conteudo = elemento.nextElementSibling;
        conteudo.style.display = (conteudo.style.display === 'none') ? 'block' : 'none';
    }

    // Iniciar
    carregarDashboard();
</script>
</body>
</html>
