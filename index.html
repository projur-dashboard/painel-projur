<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PROJUR IPSEM</title>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #0f1117; --bg2: #161b27; --border: rgba(255,255,255,0.08); --text: #e8eaf0; --text-dim: #8b92a8; --c-jul: #34d399; }
        body { font-family: 'IBM Plex Sans', sans-serif; background: var(--bg); color: var(--text); padding: 20px; }
        .container { max-width: 900px; margin: 0 auto; }
        header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; border-bottom: 1px solid var(--border); padding-bottom: 20px; }
        .stats-count { font-size: 32px; font-weight: 600; color: var(--c-jul); }
        .day-group { background: var(--bg2); border: 1px solid var(--border); border-radius: 8px; margin-bottom: 10px; }
        .day-hdr { padding: 15px 20px; display: flex; justify-content: space-between; cursor: pointer; font-weight: 600; }
        .day-content { display: none; padding: 10px 20px 20px; border-top: 1px solid var(--border); background: rgba(0,0,0,0.2); }
        .proc-card { padding: 12px 0; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .proc-card:last-child { border-bottom: none; }
        .proc-obs { font-size: 13px; color: var(--c-jul); margin-top: 5px; font-style: italic; }
        #loading { text-align: center; margin-top: 100px; color: var(--text-dim); }
    </style>
</head>
<body>
<div class="container">
    <header>
        <div><h1>PROJUR Dashboard</h1><small id="update-time"></small></div>
        <div style="text-align:right"><span id="top-prazos" class="stats-count">0</span><br><small>PRAZOS ATIVOS</small></div>
    </header>
    <div id="loading">Carregando dados...</div>
    <div id="agenda-lista"></div>
</div>

<script>
    const API = "https://script.google.com/macros/s/AKfycbwHMhqcltmxQil4TbSIejrc-cDbne5Q7Jlt8ZM_scAPaksUz1k-UE6GL72B1DKnO57v/exec?t=" + new Date().getTime();
    
    async function load() {
        const res = await fetch(API);
        const d = await res.json();
        document.getElementById('loading').style.display = 'none';
        document.getElementById('update-time').innerText = "Atualizado: " + d.geradoEm;
        document.getElementById('top-prazos').innerText = d.comPrazo;
        
        const lista = document.getElementById('agenda-lista');
        d.agenda.forEach(dia => {
            const dataBR = dia.date.split('-').reverse().join('/');
            let htmlProc = "";
            
            Object.keys(dia.advs).forEach(adv => {
                dia.advs[adv].forEach(p => {
                    htmlProc += `<div class="proc-card">
                        <strong>[${adv}]</strong> ${p.nome}<br>
                        <small style="color:var(--text-dim)">${p.proc} - ${p.tipo}</small>
                        <div class="proc-obs">${p.obs}</div>
                    </div>`;
                });
            });

            lista.innerHTML += `
                <div class="day-group">
                    <div class="day-hdr" onclick="this.nextElementSibling.style.display = (this.nextElementSibling.style.display === 'block' ? 'none' : 'block')">
                        <span>📅 ${dataBR}</span>
                        <span>▾</span>
                    </div>
                    <div class="day-content">${htmlProc}</div>
                </div>`;
        });
    }
    load();
</script>
</body>
</html>
