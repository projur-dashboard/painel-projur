<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PROJUR Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #0f1117; --bg2: #161b27; --border: rgba(255,255,255,0.08); --text: #e8eaf0; --text-dim: #8b92a8; --c-jul: #34d399; }
        body { font-family: 'IBM Plex Sans', sans-serif; background: var(--bg); color: var(--text); padding: 20px; margin: 0; }
        .container { max-width: 1100px; margin: 0 auto; }
        header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); padding-bottom: 20px; margin-bottom: 20px; }
        
        /* Seções Gerais */
        .section-title { font-size: 11px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 1.5px; margin: 30px 0 15px; display: block; font-weight: 600; }
        
        /* Cards Advogados */
        .grid-advs { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; }
        .adv-card { background: var(--bg2); padding: 20px; border-radius: 10px; border: 1px solid var(--border); }
        .adv-val { font-size: 32px; font-weight: 600; display: block; color: #fff; }

        /* Container de Gráficos (Distribuição) */
        .dist-row { display: grid; grid-template-columns: 1.5fr 1fr; gap: 20px; margin-top: 20px; }
        .chart-box { background: var(--bg2); padding: 20px; border-radius: 10px; border: 1px solid var(--border); }
        
        /* Barras Horizontais */
        .bar-row { display: flex; align-items: center; margin-bottom: 12px; font-size: 12px; }
        .bar-label { width: 100px; color: var(--text-dim); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .bar-track { flex-grow: 1; height: 10px; background: rgba(255,255,255,0.05); border-radius: 5px; margin: 0 15px; overflow: hidden; }
        .bar-fill { height: 100%; background: var(--c-jul); border-radius: 5px; transition: width 1s; }

        /* Agenda */
        .day-group { background: var(--bg2); border: 1px solid var(--border); border-radius: 8px; margin-bottom: 10px; }
        .day-hdr { padding: 15px 20px; display: flex; justify-content: space-between; cursor: pointer; }
        .day-content { display: none; padding: 20px; border-top: 1px solid var(--border); }
        .obs { margin-top: 10px; padding: 10px; border-left: 3px solid var(--c-jul); background: rgba(52, 211, 153, 0.05); color: var(--c-jul); font-size: 13px; }
    </style>
</head>
<body>
<div class="container">
    <header>
        <div><h1>PROJUR Dashboard</h1><small id="upd">Sincronizando...</small></div>
        <div style="text-align:right"><span id="top-count" style="font-size:32px; font-weight:600; color:var(--c-jul)">0</span><br><small>PRAZOS</small></div>
    </header>

    <span class="section-title">Distribuição por Consultor</span>
    <div class="grid-advs" id="adv-grid"></div>

    <div class="dist-row">
        <div class="chart-box">
            <span class="section-title" style="margin:0 0 15px 0">Processos por Tipo</span>
            <div id="types-chart"></div>
        </div>
        <div class="chart-box" style="text-align:center">
            <span class="section-title" style="margin:0 0 15px 0">Status Geral</span>
            <div style="font-size:48px; margin-top:20px">465</div>
            <div style="color:var(--text-dim); font-size:12px">PROCESSOS TOTAIS</div>
        </div>
    </div>

    <span class="section-title">Agenda de Prazos (Clique para abrir)</span>
    <div id="agenda-lista"></div>
</div>

<script>
    async function init() {
        const API = "https://script.google.com/macros/s/AKfycbwHMhqcltmxQil4TbSIejrc-cDbne5Q7Jlt8ZM_scAPaksUz1k-UE6GL72B1DKnO57v/exec?t=" + new Date().getTime();
        const res = await fetch(API);
        const d = await res.json();

        document.getElementById('upd').innerText = "Atualizado: " + d.geradoEm;
        document.getElementById('top-count').innerText = d.comPrazo;

        // Advogados
        const grid = document.getElementById('adv-grid');
        const cores = {JOSINALDO: '#4f8ef7', JULIANA: '#34d399', JULIANNE: '#a78bfa', RAFAELLE: '#fb923c'};
        Object.keys(cores).forEach(a => {
            grid.innerHTML += `<div class="adv-card" style="border-top: 4px solid ${cores[a]}"><small>${a}</small><span class="adv-val">${d.porAdv[a]||0}</span></div>`;
        });

        // Tipos (Gráfico de Barras Horizontais)
        const typeChart = document.getElementById('types-chart');
        const tiposOrdenados = Object.entries(d.porTipo).sort((a,b) => b[1] - a[1]).slice(0, 6);
        tiposOrdenados.forEach(([nome, valor]) => {
            const perc = (valor / tiposOrdenados[0][1]) * 100;
            typeChart.innerHTML += `
                <div class="bar-row">
                    <span class="bar-label">${nome}</span>
                    <div class="bar-track"><div class="bar-fill" style="width:${perc}%"></div></div>
                    <span style="font-weight:600">${valor}</span>
                </div>`;
        });

        // Agenda
        const lista = document.getElementById('agenda-lista');
        d.agenda.forEach(dia => {
            let cards = "";
            Object.keys(dia.advs).forEach(a => {
                dia.advs[a].forEach(p => {
                    cards += `<div style="margin-bottom:15px; border-bottom:1px solid rgba(255,255,255,0.05); padding-bottom:10px">
                        <strong style="color:${cores[a]}">${a}</strong> | <span>${p.nome}</span><br>
                        <small style="color:var(--text-dim)">${p.proc} - ${p.tipo}</small>
                        <div class="obs">${p.obs}</div>
                    </div>`;
                });
            });
            lista.innerHTML += `
                <div class="day-group">
                    <div class="day-hdr" onclick="this.nextElementSibling.style.display = this.nextElementSibling.style.display === 'block' ? 'none' : 'block'">
                        <span>📅 ${dia.date.split('-').reverse().join('/')}</span><span>▾</span>
                    </div>
                    <div class="day-content">${cards}</div>
                </div>`;
        });
    }
    init();
</script>
</body>
</html>
