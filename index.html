<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>PROJUR IPSEM 2026</title>
    <style>
        body{background:#0f1117;color:#e8eaf0;font-family:sans-serif;margin:0;padding:20px}
        .grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:15px;margin-bottom:30px}
        .card{background:#161b27;padding:20px;border-radius:12px;border-top:4px solid #4f8ef7;border-left:1px solid #2d3343}
        .day-box{background:#161b27;margin-bottom:10px;border-radius:8px;border:1px solid #2d3343}
        .day-hdr{padding:15px;background:rgba(255,255,255,0.03);cursor:pointer;display:flex;justify-content:space-between;font-weight:600}
        .proc{padding:12px;border-top:1px solid #2d3343}
        .adv-tag{font-size:10px;padding:2px 6px;border-radius:4px;margin-right:8px;color:#fff}
    </style>
</head>
<body>
    <h2 id="titulo">PROJUR IPSEM</h2>
    <p id="info" style="color:#8b92a8;font-size:12px">Sincronizando...</p>
    
    <div class="grid" id="cards"></div>
    
    <h3>Agenda de Prazos (Maio/Julho)</h3>
    <div id="lista"></div>

    <script>
        const API = "https://script.google.com/macros/s/AKfycbwHMhqcltmxQil4TbSIejrc-cDbne5Q7Jlt8ZM_scAPaksUz1k-UE6GL72B1DKnO57v/exec";
        const CORES = {JOSINALDO:'#4f8ef7', JULIANA:'#34d399', JULIANNE:'#a78bfa', RAFAELLE:'#fb923c', OUTROS:'#555d72'};

        async function load() {
            const r = await fetch(API);
            const d = await r.json();
            
            document.getElementById('info').innerText = "Total: " + d.total + " processos | Atualizado em: " + d.geradoEm;
            
            const cards = document.getElementById('cards');
            cards.innerHTML = "";
            for(let adv in d.porAdv) {
                if(d.porAdv[adv] > 0) {
                    cards.innerHTML += `<div class="card" style="border-top-color:${CORES[adv] || '#555d72'}">
                        <small style="color:#8b92a8">${adv}</small><br>
                        <span style="font-size:32px;font-weight:600">${d.porAdv[adv]}</span>
                    </div>`;
                }
            }

            const lista = document.getElementById('lista');
            lista.innerHTML = "";
            d.agenda.forEach(dia => {
                let htmlProcs = "";
                for(let adv in dia.advs) {
                    dia.advs[adv].forEach(p => {
                        htmlProcs += `<div class="proc">
                            <span class="adv-tag" style="background:${CORES[adv] || '#555'}">${adv}</span>
                            <b>${p.nome}</b><br>
                            <small style="color:#8b92a8">${p.proc}</small><br>
                            <span style="color:#34d399;font-size:13px">⏱ ${p.obs}</span>
                        </div>`;
                    });
                }
                const dataF = dia.date.split('-').reverse().join('/');
                lista.innerHTML += `<div class="day-box">
                    <div class="day-hdr" onclick="this.nextElementSibling.style.display = this.nextElementSibling.style.display === 'none' ? 'block' : 'none'">
                        <span>${dataF}</span><span>${dia.date > '2026-04' ? '🔴' : ''}</span>
                    </div>
                    <div class="day-content">${htmlProcs}</div>
                </div>`;
            });
        }
        load();
    </script>
</body>
</html>
