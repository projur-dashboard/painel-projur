<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PROJUR IPSEM — Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;600&family=IBM+Plex+Mono&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0f1117;
            --bg2: #161b27;
            --border: rgba(255,255,255,0.08);
            --text: #e8eaf0;
            --text-dim: #8b92a8;
            --c-jos: #4f8ef7;
            --c-jul: #34d399;
            --c-jun: #a78bfa;
            --c-raf: #fb923c;
        }

        body {
            font-family: 'IBM Plex Sans', sans-serif;
            background: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 20px;
            line-height: 1.5;
        }

        .container { max-width: 1200px; margin: 0 auto; }

        header {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            margin-bottom: 30px;
            border-bottom: 1px solid var(--border);
            padding-bottom: 20px;
        }

        .metrics {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 15px;
            margin-bottom: 40px;
        }

        .card {
            background: var(--bg2);
            padding: 20px;
            border-radius: 12px;
            border: 1px solid var(--border);
            border-top: 4px solid #fff;
        }

        .card-label { font-size: 11px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 1px; }
        .card-val { font-size: 32px; font-weight: 600; display: block; margin: 5px 0; }

        .filter-bar {
            display: flex;
            gap: 8px;
            margin-bottom: 20px;
            flex-wrap: wrap;
            position: sticky;
            top: 10px;
            z-index: 10;
        }

        .f-pill {
            background: var(--bg2);
            border: 1px solid var(--border);
            color: var(--text-dim);
            padding: 8px 16px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 12px;
            transition: 0.2s;
        }

        .f-pill.active { background: var(--text); color: var(--bg); border-color: var(--text); font-weight: 600; }

        .agenda-section h3 { font-family: 'IBM Plex Mono', monospace; font-size: 13px; color: var(--text-dim); margin-bottom: 15px; }

        .day-group {
            background: var(--bg2);
            border: 1px solid var(--border);
            border-radius: 10px;
            margin-bottom: 10px;
            overflow: hidden;
        }

        .day-hdr {
            padding: 15px 20px;
            background: rgba(255,255,255,0.02);
            display: flex;
            justify-content: space-between;
            cursor: pointer;
            font-weight: 600;
        }

        .day-hdr:hover { background: rgba(255,255,255,0.05); }

        .proc-item {
            padding: 15px 20px;
            border-top: 1px solid var(--border);
            position: relative;
        }

        .adv-tag {
            font-size: 9px;
            font-weight: 600;
            padding: 2px 6px;
            border-radius: 4px;
            text-transform: uppercase;
            margin-right: 8px;
            color: #fff;
        }

        .proc-name { font-size: 14px; color: #fff; font-weight: 600; }
        .proc-meta { font-size: 12px; color: var(--text-dim); margin: 4px 0; }
        .proc-obs { font-size: 12px; color: var(--c-jul); margin-top: 6px; font-style: italic; }

        @media (max-width: 600px) {
            .metrics { grid-template-columns: 1fr 1fr; }
            .card-val { font-size: 24px; }
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <div>
            <h1 style="margin:0; font-size:22px;">PROJUR IPSEM</h1>
            <div id="sync-info" style="font-size:11px; color:var(--text-dim); margin-top:5px;">Sincronizando...</div>
        </div>
        <div style="text-align:right">
            <span id="total-deadlines" style="font-family:'IBM Plex Mono'; font-size:20px; color:var(--c-jul)">0</span>
            <div style="font-size:9px; color:var(--text-dim)">PRAZOS ATIVOS</div>
        </div>
    </header>

    <div class="metrics" id="adv-metrics"></div>

    <div class="agenda-section">
        <h3>AGENDA INTEGRAL DE PRAZOS</h3>
        <div class="filter-bar" id="filter-bar">
            <button class="f-pill active" onclick="applyFilter('Todos', this)">TODOS</button>
        </div>
        <div id="agenda-container"></div>
    </div>
</div>

<script>
    const API_URL = "https://script.google.com/macros/s/AKfycbwHMhqcltmxQil4TbSIejrc-cDbne5Q7Jlt8ZM_scAPaksUz1k-UE6GL72B1DKnO57v/exec";
    const COLORS = { JOSINALDO: 'var(--c-jos)', JULIANA: 'var(--c-jul)', JULIANNE: 'var(--c-jun)', RAFAELLE: 'var(--c-raf)' };
    let dashboardData = null;

    async function fetchData() {
        try {
            const response = await fetch(API_URL);
            dashboardData = await response.json();
            renderDashboard();
        } catch (error) {
            document.getElementById('sync-info').innerText = "Erro ao carregar dados.";
        }
    }

    function renderDashboard() {
        document.getElementById('sync-info').innerText = "Última sincronização: " + dashboardData.geradoEm;
        document.getElementById('total-deadlines').innerText = dashboardData.comPrazo;

        const metricsContainer = document.getElementById('adv-metrics');
        const filterBar = document.getElementById('filter-bar');
        
        // Render Advogado Cards
        Object.keys(COLORS).forEach(adv => {
            const count = dashboardData.porAdv[adv] || 0;
            metricsContainer.innerHTML += `
                <div class="card" style="border-top-color: ${COLORS[adv]}">
                    <span class="card-label">${adv}</span>
                    <span class="card-val">${count}</span>
                    <span style="font-size:10px; color:var(--text-dim)">PROCESSOS TOTAIS</span>
                </div>
            `;
            filterBar.innerHTML += `<button class="f-pill" onclick="applyFilter('${adv}', this)">${adv}</button>`;
        });

        applyFilter('Todos');
    }

    function applyFilter(advName, btn) {
        if (btn) {
            document.querySelectorAll('.f-pill').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
        }

        const container = document.getElementById('agenda-container');
        container.innerHTML = '';

        dashboardData.agenda.forEach(day => {
            let filteredProcs = [];
            
            if (advName === 'Todos') {
                Object.keys(day.advs).forEach(key => {
                    day.advs[key].forEach(p => filteredProcs.push({ ...p, adv: key }));
                });
            } else {
                const procs = day.advs[advName] || [];
                procs.forEach(p => filteredProcs.push({ ...p, adv: advName }));
            }

            if (filteredProcs.length > 0) {
                const dateDisplay = day.date.split('-').reverse().join('/');
                const procHtml = filteredProcs.map(p => `
                    <div class="proc-item">
                        <span class="adv-tag" style="background:${COLORS[p.adv] || '#555'}">${p.adv}</span>
                        <span class="proc-name">${p.nome}</span>
