<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PROJUR IPSEM — Dashboard 2026</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
:root{--bg:#0f1117;--bg2:#161b27;--bg3:#1e2535;--border:rgba(255,255,255,0.07);--text:#e8eaf0;--text2:#8b92a8;--text3:#555d72;--c-jos:#4f8ef7;--c-jul:#34d399;--c-jun:#a78bfa;--c-raf:#fb923c}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'IBM Plex Sans',sans-serif;background:var(--bg);color:var(--text);font-size:13px;line-height:1.5}
header{border-bottom:1px solid var(--border);padding:0 24px;display:flex;align-items:center;height:52px;position:sticky;top:0;background:rgba(15,17,23,0.9);backdrop-filter:blur(10px);z-index:100}
.logo{font-family:'IBM Plex Mono',monospace;font-size:10px;font-weight:600;color:var(--c-jos);border:1px solid var(--c-jos);padding:2px 6px;border-radius:4px;margin-right:12px}
.hdr-info{flex:1;font-size:12px;color:var(--text2)}
main{padding:20px 24px;max-width:1400px;margin:0 auto}
.section-title{font-family:'IBM Plex Mono',monospace;font-size:10px;text-transform:uppercase;color:var(--text3);margin:25px 0 12px;letter-spacing:1px}
.metrics-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}
.m-card{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:16px;position:relative}
.m-card::after{content:'';position:absolute;top:0;left:0;right:0;height:2px;border-radius:12px 12px 0 0}
.m-blue::after{background:var(--c-jos)}.m-green::after{background:var(--c-jul)}.m-purple::after{background:var(--c-jun)}.m-orange::after{background:var(--c-raf)}
.m-label{font-size:11px;color:var(--text3);margin-bottom:8px}
.m-value{font-size:28px;font-weight:600;color:#fff}
.adv-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}
.adv-card{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:16px}
.adv-header{display:flex;align-items:center;gap:8px;margin-bottom:12px}
.adv-dot{width:6px;height:6px;border-radius:50%}
.adv-n{font-size:24px;font-weight:600}
.adv-sub{font-size:11px;color:var(--text3);margin-bottom:15px}
.mini-bar-row{display:flex;align-items:center;gap:8px;margin-bottom:6px}
.mini-label{font-size:10px;color:var(--text2);width:55px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.mini-bg{flex:1;background:var(--bg3);height:4px;border-radius:2px}
.mini-fill{height:100%;border-radius:2px}
.charts-grid{display:grid;grid-template-columns:1.5fr 1fr;gap:12px}
.chart-box{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:20px}
.filter-row{display:flex;gap:8px;margin-bottom:15px}
.f-pill{background:transparent;border:1px solid var(--border);color:var(--text2);padding:4px 12px;border-radius:20px;cursor:pointer;font-size:12px}
.f-pill.active{background:var(--text);color:var(--bg);border-color:var(--text)}
.day-item{background:var(--bg2);border:1px solid var(--border);border-radius:8px;margin-bottom:6px}
.day-header{padding:12px 16px;display:flex;align-items:center;justify-content:space-between;cursor:pointer}
.day-content{display:none;padding:0 16px 12px;border-top:1px solid var(--border)}
.day-content.open{display:block}
.proc-row{padding:10px 0;border-bottom:1px solid var(--border)}
.proc-row:last-child{border-bottom:none}
</style>
</head>
<body>
<header>
    <div class="logo">PROJUR</div>
    <div class="hdr-info">IPSEM Campina Grande — Dashboard de Processos 2026</div>
    <div id="sync-time" style="font-size:10px; color:var(--text3)">Sincronizando...</div>
</header>
<main>
    <div class="section-title">Visão Geral</div>
    <div class="metrics-grid">
        <div class="m-card m-blue"><div class="m-label">Total de processos</div><div class="m-value" id="t-geral">0</div></div>
        <div class="m-card m-green"><div class="m-label">Com prazos registrados</div><div class="m-value" id="t-prazos">0</div></div>
        <div class="m-card m-purple"><div class="m-label">Processos judiciais</div><div class="m-value" id="t-jud">0</div></div>
        <div class="m-card m-orange"><div class="m-label">Processos TCE/PB</div><div class="m-value" id="t-tce">0</div></div>
    </div>

    <div class="section-title">Por Advogado / Consultor Jurídico</div>
    <div class="adv-grid" id="adv-container"></div>

    <div class="charts-grid">
        <div class="chart-box"><div class="section-title" style="margin-top:0">Processos por Tipo</div><canvas id="chartTipo" height="300"></canvas></div>
        <div class="chart-box"><div class="section-title" style="margin-top:0">Entrada por Mês</div><canvas id="chartMes" height="300"></canvas></div>
    </div>

    <div class="section-title">Agenda de Prazos</div>
    <div class="filter-row" id="adv-filters">
        <button class="f-pill active" onclick="filterAgenda('Todos', this)">Todos</button>
    </div>
    <div id="agenda-list"></div>
</main>

<script>
const API = "https://script.google.com/macros/s/AKfycbwHMhqcltmxQil4TbSIejrc-cDbne5Q7Jlt8ZM_scAPaksUz1k-UE6GL72B1DKnO57v/exec";
const COLORS = {JOSINALDO:'#4f8ef7', JULIANA:'#34d399', JULIANNE:'#a78bfa', RAFAELLE:'#fb923c'};
let rawData = null;

async function init(){
    try {
        const resp = await fetch(API);
        rawData = await resp.json();
        renderDashboard();
    } catch(e) { document.getElementById('sync-time').innerText = "Erro na API"; }
}

function renderDashboard(){
    document.getElementById('t-geral').innerText = rawData.total;
    document.getElementById('t-prazos').innerText = rawData.comPrazo;
    document.getElementById('t-jud').innerText = rawData.porTipo['JUDICIAL'] || 0;
    document.getElementById('t-tce').innerText = rawData.porTipo['TCE'] || 0;
    document.getElementById('sync-time').innerText = "Dados de: " + rawData.geradoEm;

    const advCont = document.getElementById('adv-container');
    const filterCont = document.getElementById('adv-filters');
    advCont.innerHTML = '';
    
    ['JOSINALDO','JULIANA','JULIANNE','RAFAELLE'].forEach(name => {
        const total = rawData.porAdv[name] || 0;
        const color = COLORS[name];
        const tipos = Object.entries(rawData.advTipo[name] || {}).sort((a,b)=>b[1]-a[1]).slice(0,5);
        
        let bars = tipos.map(([tipo, qtd]) => `
            <div class="mini-bar-row">
                <span class="mini-label">${tipo}</span>
                <div class="mini-bg"><div class="mini-fill" style="width:${(qtd/total*100)}%; background:${color}"></div></div>
                <span style="font-size:9px; color:var(--text3); width:15px">${qtd}</span>
            </div>`).join('');

        advCont.innerHTML += `
            <div class="adv-card">
                <div class="adv-header"><div class="adv-dot" style="background:${color}"></div><strong>${name}</strong></div>
                <div class="adv-n">${total}</div><div class="adv-sub">processos</div>
                <div style="margin-top:10px">${bars}</div>
            </div>`;
            
        filterCont.innerHTML += `<button class="f-pill" onclick="filterAgenda('${name}', this)" style="border-color:${color}">${name}</button>`;
    });

    renderCharts();
    filterAgenda('Todos');
}

function renderCharts(){
    new Chart(document.getElementById('chartTipo'), {
        type:'bar', data:{labels:Object.keys(rawData.porTipo), datasets:[{data:Object.values(rawData.porTipo), backgroundColor:'#4f8ef7', borderRadius:4}]},
        options:{indexAxis:'y', plugins:{legend:false}, scales:{x:{grid:{display:false},ticks:{color:'#8b92a8'}},y:{grid:{display:false},ticks:{color:'#8b92a8'}}}}
    });
    new Chart(document.getElementById('chartMes'), {
        type:'bar', data:{labels:['Jan','Fev','Mar','Abr','Mai'], datasets:[{data:[140, 160, 90, 110, 80], backgroundColor: 'rgba(79,142,247,0.2)', borderColor:'#4f8ef7', borderWidth:1}]},
        options:{plugins:{legend:false}, scales:{x:{grid:{display:false},ticks:{color:'#8b92a8'}},y:{grid:{color:'rgba(255,255,255,0.05)'},ticks:{color:'#8b92a8'}}}}
    });
}

function filterAgenda(name, btn){
    if(btn){
        document.querySelectorAll('.f-pill').forEach(p => p.classList.remove('active'));
        btn.classList.add('active');
    }
    const cont = document.getElementById('agenda-list');
    cont.innerHTML = '';
    
    rawData.agenda.forEach(day => {
        let procs = [];
        if(name === 'Todos'){
            Object.values(day.advs).forEach(list => procs = procs.concat(list));
        } else {
            procs = day.advs[name] || [];
        }

        if(procs.length > 0){
            let rows = procs.map(p => `
                <div class="proc-row">
                    <div style="font-weight:500">${p.nome}</div>
                    <div style="font-size:11px; color:var(--text3)">${p.proc} | <span style="color:var(--text2)">${p.tipo}</span></div>
                    <div style="font-size:11px; margin-top:4px">⏱ ${p.obs}</div>
                </div>`).join('');
                
            cont.innerHTML += `
                <div class="day-item">
                    <div class="day-header" onclick="this.nextElementSibling.classList.toggle('open')">
                        <span><strong>${day.date}</strong></span>
                        <span style="font-size:11px; color:var(--text3)">${procs.length} proc. ▾</span>
                    </div>
                    <div class="day-content">${rows}</div>
                </div>`;
        }
    });
}
init();
</script>
</body>
</html>
