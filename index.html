<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PROJUR IPSEM — Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root{--bg:#0f1117;--bg2:#161b27;--border:rgba(255,255,255,0.07);--text:#e8eaf0;--c-jos:#4f8ef7;--c-jul:#34d399;--c-jun:#a78bfa;--c-raf:#fb923c}
        body{font-family:'IBM Plex Sans',sans-serif;background:var(--bg);color:var(--text);margin:0;padding:24px}
        .metrics{display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));gap:15px;margin-bottom:30px}
        .card{background:var(--bg2);padding:20px;border-radius:12px;border:1px solid var(--border);border-top:4px solid #fff}
        .adv-name{font-size:12px;color:#8b92a8;text-transform:uppercase;letter-spacing:1px}
        .adv-val{font-size:32px;font-weight:600;margin:8px 0;display:block}
        .mini-bar{height:4px;background:rgba(255,255,255,0.05);margin-top:15px;border-radius:2px;overflow:hidden;display:flex}
        .f-pill{background:transparent;border:1px solid var(--border);color:#8b92a8;padding:8px 16px;border-radius:20px;cursor:pointer;margin-right:8px;font-size:11px}
        .f-pill.active{background:var(--text);color:var(--bg)}
        .day-box{background:var(--bg2);border:1px solid var(--border);border-radius:10px;margin-bottom:10px;overflow:hidden}
        .day-hdr{padding:15px;background:rgba(255,255,255,0.02);display:flex;justify-content:space-between;cursor:pointer}
        .day-body{padding:0 15px 15px;display:block}
        .proc{padding:12px 0;border-bottom:1px solid rgba(255,255,255,0.05)}
    </style>
</head>
<body>
    <div style="margin-bottom:30px">
        <h2 style="margin:0">PROJUR IPSEM</h2>
        <div id="sync" style="font-size:11px;color:#555d72">Carregando dados reais da planilha...</div>
    </div>

    <div class="metrics" id="cards"></div>

    <div style="margin:40px 0 20px">
        <h3 style="font-size:12px;color:#8b92a8;text-transform:uppercase">Agenda de Prazos (Maio - Julho)</h3>
        <div id="filters">
            <button class="f-pill active" onclick="filtrar('Todos', this)">TODOS OS PRAZOS</button>
        </div>
    </div>

    <div id="lista"></div>

<script>
    const API = "https://script.google.com/macros/s/AKfycbwHMhqcltmxQil4TbSIejrc-cDbne5Q7Jlt8ZM_scAPaksUz1k-UE6GL72B1DKnO57v/exec";
    const CORES = {JOSINALDO:'var(--c-jos)', JULIANA:'var(--c-jul)', JULIANNE:'var(--c-jun)', RAFAELLE:'var(--c-raf)'};
    let d = null;

    async function init() {
        const r = await fetch(API);
        d = await r.json();
        document.getElementById('sync').innerText = "Total: " + d.total + " processos | Atualizado em: " + d.geradoEm;
        
        const cards = document.getElementById('cards');
        const filters = document.getElementById('filters');

        Object.keys(CORES).forEach(adv => {
            const total = d.porAdv[adv] || 0;
            cards.innerHTML += `
                <div class="card" style="border-top-color:${CORES[adv]}">
                    <span class="adv-name">${adv}</span>
                    <span class="adv-val">${total}</span>
                    <div style="font-size:11px;color:#555d72">Processos Totais</div>
                </div>`;
            filters.innerHTML += `<button class="f-pill" onclick="filtrar('${adv}', this)">${adv}</button>`;
        });
        filtrar('Todos');
    }

    function filtrar(quem, btn) {
        if(btn) {
            document.querySelectorAll('.f-pill').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
        }
        const lista = document.getElementById('lista');
        lista.innerHTML = '';

        d.agenda.forEach(dia => {
            let procs = [];
            if(quem === 'Todos') Object.values(dia.advs).forEach(l => procs = procs.concat(l));
            else procs = dia.advs[quem] || [];

            if(procs.length > 0) {
                const dataF = dia.date.split('-').reverse().join('/');
                const html = procs.map(p => `
                    <div class="proc">
                        <div style="font-weight:600">${p.nome}</div>
                        <div style="font-size:11px;color:#8b92a8;margin:4px 0">${p.proc} | ${p.tipo}</div>
                        <div style="font-size:11px;color:var(--c-jul)"><b>Obs:</b> ${p.obs}</div>
                    </div>`).join('');

                lista.innerHTML += `
                    <div class="day-box">
                        <div class="day-hdr" onclick="this.nextElementSibling.style.display = this.nextElementSibling.style.display === 'none' ? 'block' : 'none'">
                            <span>${dataF}</span><span>${procs.length} ▾</span>
                        </div>
                        <div class="day-body">${html}</div>
                    </div>`;
            }
        });
    }
    init();
</script>
</body>
</html>
