<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PROJUR IPSEM | Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0f1117; --bg2: #161b27; --border: rgba(255,255,255,0.08);
            --text: #e8eaf0; --text-dim: #8b92a8;
            --c-jos: #4f8ef7; --c-jul: #34d399; --c-jun: #a78bfa; --c-raf: #fb923c;
        }
        body { font-family: 'IBM Plex Sans', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 20px; }
        .container { max-width: 1100px; margin: 0 auto; }
        
        header { display: flex; justify-content: space-between; align-items: center; padding-bottom: 20px; border-bottom: 1px solid var(--border); margin-bottom: 30px; }
        .stats-main { font-size: 32px; font-weight: 600; color: var(--c-jul); }

        /* VISÃO GERAL - SEMPRE VISÍVEL */
        .section-title { font-size: 11px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 1.5px; margin: 30px 0 15px; display: block; font-weight: 600; }
        .grid-overview { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 15px; }
        .card-ov { background: var(--bg2); padding: 20px; border-radius: 10px; border: 1px solid var(--border); }
        .ov-val { font-size: 32px; font-weight: 600; display: block; margin-bottom: 5px; color: #fff; }
        .ov-label { font-size: 11px; color: var(--text-dim); text-transform: uppercase; }

        /* DISTRIBUIÇÃO - SEMPRE VISÍVEL */
        .grid-advs { display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 15px; }
        .adv-stat-box { background: var(--bg2); padding: 20px; border-radius: 10px; border-top: 4px solid #555; border-left: 1px solid var(--border); border-right: 1px solid var(--border); border-bottom: 1px solid var(--border); }
        .adv-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .bar-bg { height: 6px; background: rgba(255,255,255,0.05); border-radius: 3px; overflow: hidden; }
        .bar-fill { height: 100%; transition: width 1s; }

        /* AGENDA - RECOLHIDA (ACORDEÃO) */
        .day-group { background: var(--bg2); border: 1px solid var(--border); border-radius: 8px; margin-bottom: 10px; }
        .day-hdr { padding: 15px 20px; display: flex; justify-content: space-between; cursor: pointer; transition: 0.2s; }
        .day-hdr:hover { background: rgba(255,255,255,0.05); }
        .day-content { display: none; padding: 0 20px 20px; border-top: 1px solid var(--border); }
        
        .proc-card { padding: 15px 0; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .proc-card:last-child { border-bottom: none; }
        .badge { font-size: 9px; padding: 2px 6px; border-radius: 4px; color: #fff; margin-right: 8px; font-weight: 700; text-transform: uppercase; }
        .obs-box { margin-top: 10px; padding: 10px; border-left: 3px solid var(--c-jul); background: rgba(52, 211, 153, 0.05); font-size: 13px; color: var(--c-jul); font-style: italic; }

        #loading { text-align: center; margin-top: 50px; color: var(--text-dim); }
    </style>
</head>
<body>

<div class="container">
    <header>
        <div>
            <h1 style="margin:0; font-size:24px">PROJUR Dashboard</h1>
            <small id="upd" style="color:var(--text-dim)">Carregando...</small>
        </div>
        <div style="text-align:right">
            <span id="top-count" class="stats-main">0</span><br>
            <small style="font-size:10px; color:var(--text-dim)">PRAZOS ATIVOS</small>
        </div>
    </header>

    <span class="section-title">Visão Geral de Processos</span>
    <div class="grid-overview">
        <div class="card-ov"><span class="ov-val">465</span><span class="ov-label">Total de Processos</span></div>
        <div class="card-ov"><span class="ov-val" id="ov-prazos" style="color:var(--c-jul)">0</span><span class="ov-label">Com Prazos</span></div>
        <div class="card-ov"><span class="ov-val">222</span><span class="ov-label">Judiciais</span></div>
        <div class="card-ov"><span class="ov-val">35</span><span class="ov-label">TCE/PB</span></div>
    </div>

    <span class="section-title">Carga por Consultor</span>
    <div class="grid-advs" id="adv-grid"></div>

    <span class="section-title">Cronograma de Prazos (Clique para expandir)</span>
    <div id="loading">Sincronizando com a planilha...</div>
    <div id="agenda-lista"></div>
</div>

<script>
    const API = "https://script.google.com/macros/s/AKfycbwHMhqcltmxQil4TbSIejrc-cDbne5Q7Jlt8ZM_scAPaksUz1k-UE6GL72B1DKnO57v/exec?t=" + new Date().getTime();
    const CORES = { JOSINALDO: 'var(--c-jos)', JULIANA: 'var(--c-jul)', JULIANNE: 'var(--c-jun)', RAFAELLE: 'var(--c-raf)' };

    async function init() {
        try {
            const res = await fetch(API);
            const d = await res.json();
            
            document.getElementById('loading').style.display = 'none';
            document.getElementById('upd').innerText = "Atualizado em: " + d.geradoEm;
            document.getElementById('top-count').innerText = d.comPrazo;
            document.getElementById('ov-prazos').innerText = d.comPrazo;

            // Renderizar Gráficos de Carga
            const advGrid = document.getElementById('adv-grid');
            Object.keys(CORES).forEach(adv => {
                const total = d.porAdv[adv] || 0;
                const perc = Math.min((total / 140) * 100, 100); // Base 140 para a barra
                advGrid.innerHTML += `
                    <div class="adv-stat-box" style="border-top-color: ${CORES[adv]}">
                        <div class="adv-header"><strong>${adv}</strong><span style="color:${CORES[adv]}">${total}</span></div>
                        <div class="bar-bg"><div class="bar-fill" style="width:${perc}%; background:${CORES[adv]}"></div></div>
                        <small style="font-size:10px; color:var(--text-dim)">PROCESSOS ATIVOS</small>
                    </div>`;
            });

            // Renderizar Agenda Recolhida
            const lista = document.getElementById('agenda-lista');
            d.agenda.forEach(dia => {
                const dataBR = dia.date.split('-').reverse().join('/');
                let cardsHtml = "";
                let count = 0;

                Object.keys(dia.advs).forEach(adv => {
                    dia.advs[adv].forEach(p => {
                        count++;
                        cardsHtml += `
                            <div class="proc-card">
                                <span class="badge" style="background:${CORES[adv]}">${adv}</span>
                                <span style="font-weight:600; font-size:14px; color:#fff">${p.nome}</span>
                                <div style="font-size:12px; color:var(--text-dim); margin-top:4px">${p.proc} • ${p.tipo}</div>
                                <div class="obs-box">${p.obs}</div>
                            </div>`;
                    });
                });

                lista.innerHTML += `
                    <div class="day-group">
                        <div class="day-hdr" onclick="toggle(this)">
                            <span>📅 ${dataBR}</span>
                            <span style="font-size:11px; font-weight:600; color:var(--c-jul)">${count} PRAZOS ▾</span>
                        </div>
                        <div class="day-content">${cardsHtml}</div>
                    </div>`;
            });
        } catch (e) {
            document.getElementById('loading').innerText = "Erro ao carregar dados.";
        }
    }

    function toggle(el) {
        const content = el.nextElementSibling;
        const isVisible = content.style.display === 'block';
        content.style.display = isVisible ? 'none' : 'block';
    }

    init();
</script>
</body>
</html>
