<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PROJUR IPSEM — Dashboard Oficial</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
:root{--bg:#0f1117;--bg2:#161b27;--bg3:#1e2535;--border:rgba(255,255,255,0.07);--text:#e8eaf0;--text2:#8b92a8;--text3:#555d72;--c-jos:#4f8ef7;--c-jul:#34d399;--c-jun:#a78bfa;--c-raf:#fb923c}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'IBM Plex Sans',sans-serif;background:var(--bg);color:var(--text);font-size:13px;line-height:1.5;overflow-x:hidden}
header{border-bottom:1px solid var(--border);padding:0 24px;display:flex;align-items:center;height:52px;position:sticky;top:0;background:rgba(15,17,23,0.9);backdrop-filter:blur(10px);z-index:100}
.logo{font-family:'IBM Plex Mono',monospace;font-size:10px;font-weight:600;color:var(--c-jos);border:1px solid var(--c-jos);padding:2px 6px;border-radius:4px;margin-right:12px}
.hdr-info{flex:1;font-size:12px;color:var(--text2)}
main{padding:20px 24px;max-width:1400px;margin:0 auto}
.section-title{font-family:'IBM Plex Mono',monospace;font-size:10px;text-transform:uppercase;color:var(--text3);margin:25px 0 12px;letter-spacing:1px}
.metrics-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:12px}
.m-card{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:16px;position:relative}
.m-card::after{content:'';position:absolute;top:0;left:0;right:0;height:2px;border-radius:12px 12px 0 0}
.m-blue::after{background:var(--c-jos)}.m-green::after{background:var(--c-jul)}.m-purple::after{background:var(--c-jun)}.m-orange::after{background:var(--c-raf)}
.m-label{font-size:11px;color:var(--text3);margin-bottom:8px}
.m-value{font-size:28px;font-weight:600;color:#fff}
.adv-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:12px}
.adv-card{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:16px}
.adv-header{display:flex;align-items:center;gap:8px;margin-bottom:12px}
.adv-dot{width:6px;height:6px;border-radius:50%}
.adv-n{font-size:24px;font-weight:600}
.adv-sub{font-size:11px;color:var(--text3);margin-bottom:15px}
.mini-bar-row{display:flex;align-items:center;gap:8px;margin-bottom:6px}
.mini-label{font-size:10px;color:var(--text2);width:70px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.mini-bg{flex:1;background:var(--bg3);height:4px;border-radius:2px}
.mini-fill{height:100%;border-radius:2px}
.charts-grid{display:grid;grid-template-columns:1.5fr 1fr;gap:12px;margin-top:12px}
.chart-box{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:20px}
.filter-row{display:flex;gap:8px;margin-bottom:15px;flex-wrap:wrap}
.f-pill{background:transparent;border:1px solid var(--border);color:var(--text2);padding:6px 14px;border-radius:20px;cursor:pointer;font-size:11px;font-family:'IBM Plex Mono',monospace}
.f-pill.active{background:var(--text);color:var(--bg);border-color:var(--text)}
.day-item{background:var(--bg2);border:1px solid var(--border);border-radius:8px;margin-bottom:8px}
.day-header{padding:12px 16px;display:flex;align-items:center;justify-content:space-between;cursor:pointer;user-select:none}
.day-content{display:none;padding:0 16px 12px;border-top:1px solid var(--border)}
.day-content.open{display:block}
.proc-row{padding:12px 0;border-bottom:1px solid var(--border)}
.proc-row:last-child{border-bottom:none}
.proc-nome{font-weight:600;color:#fff;margin-bottom:4px;display:block}
.badge-tipo{font-size:9px;background:rgba(255,255,255,0.05);padding:2px 6px;border-radius:4px;color:var(--text2);margin-left:8px}
@media (max-width:900px){.charts-grid{grid-template-columns:1fr}.metrics-grid,.adv-grid{grid-template-columns:repeat(2,1fr)}}
</style>
</head>
<body>
<header>
    <div class="logo">PROJUR</div>
    <div class="hdr-info">IPSEM Campina Grande — Painel de Controle Jurídico 2026</div>
    <div id="sync-time" style="font-size:10px; color:var(--text3)">Sincronizando com Google Sheets...</div>
</header>
<main>
    <div class="section-title">Métricas de Desempenho</div>
    <div class="metrics-grid">
        <div class="m-card m-blue"><div class="m-label">Total de Processos</div><div class="m-value" id="t-geral">—</div></div>
        <div class="m-card m-green"><div class="m-label">Prazos na Agenda</div><div class="m-value" id="t-prazos">—</div></div>
        <div class="m-card m-purple"><div class="m-label">Judiciais</div><div class="m-value" id="t-jud">—</div></div>
        <div class="m-card m-orange"><div class="m-label">TCE/PB</div><div class="m-value" id="t-tce">—</div></div>
    </div>

    <div class="section-title">Análise por Membro da Equipe</div>
    <div class="adv-grid" id="adv-container"></div>

    <div class="charts-grid">
        <div class="chart-box"><div class="section-title" style="margin-top:0">Distribuição por Categoria</div><canvas id="chartTipo" height="280"></canvas></div>
        <div class="chart-box"><div class="section-title" style="margin-top:0">Entradas Mensais</div><canvas id="chartMes" height="280"></canvas></div>
    </div>

    <div class="section-title">Agenda Integral de Prazos</div>
    <div class="filter-row" id="adv-filters">
        <button class="f-pill active" onclick="filterAgenda('Todos', this)">TODOS OS PRAZOS</button>
    </div>
    <div id="agenda-list"></div>
</main>

<script>
const API = "https://script.google.com/macros/s/AKfycbwHMhqcltmxQil4TbSIejrc-cDbne5Q7Jlt8ZM_scAPaksUz1k-UE6GL72B1DKnO57v/exec";
const COLORS = {JOSINALDO:'#4f8ef7', JULIANA:'#34d399', JULIANNE:'#a78bfa', RAFAELLE:'#fb923c'};
let rawData = null;

async function init(){
    try {
        const resp = await fetch(API);
        rawData = await resp.json();
        renderDashboard();
    } catch(e) { document.getElementById('sync-time').innerText = "Erro ao carregar API do Google."; }
}

function renderDashboard(){
    document.getElementById('t-geral').innerText = rawData.total;
    document.getElementById('t-prazos').innerText = rawData.comPrazo;
    document.getElementById('t-jud').innerText = rawData.porTipo['JUDICIAL'] || 0;
    document.getElementById('t-tce').innerText = rawData.porTipo['TCE'] || 0;
    document.getElementById('sync-time').innerText = "Atualizado em: " + rawData.geradoEm;

    const advCont = document.getElementById('adv-container');
    const filterCont = document.getElementById('adv-filters');
    advCont.innerHTML = '';
    
    ['JOSINALDO','JULIANA','JULIANNE','RAFAELLE'].forEach(name => {
        const total = rawData.porAdv[name] || 0;
        const color = COLORS[name];
        const tipos = Object.entries(rawData.advTipo[name] || {}).sort((a,b)=>b[1]-a[1]).slice(0,5);
        
        let bars = tipos.map(([tipo, qtd]) => `
            <div class="mini-bar-row">
                <span class="mini-label">${tipo}</span>
                <div class="mini-bg"><div class="mini-fill" style="width:${(qtd/total*100)}%; background:${color}"></div></div>
                <span style="font-size:10px; color:var(--text3); width:20px; text-align:right">${qtd}</span>
            </div>`).join('');

        advCont.innerHTML += `
            <div class="adv-card" style="border-top: 1px solid ${color}33">
                <div class="adv-header"><div class="adv-dot" style="background:${color}"></div><strong style="color:${color}">${name}</strong></div>
                <div class="adv-n">${total}</div><div class="adv-sub">Processos Totais</div>
                <div style="margin-top:10px">${bars}</div>
            </div>`;
            
        filterCont.innerHTML += `<button class="f-pill" onclick="filterAgenda('${name}', this)" style="color:${color}; border-color:${color}44">${name}</button>`;
    });

    renderCharts();
    filterAgenda('Todos');
}

function renderCharts(){
    const ctxTipo = document.getElementById('chartTipo');
    new Chart(ctxTipo, {
        type:'bar', data:{labels:Object.keys(rawData.porTipo), datasets:[{data:Object.values(rawData.porTipo), backgroundColor:'#4f8ef7', borderRadius:4}]},
        options:{indexAxis:'y', plugins:{legend:false}, scales:{x:{grid:{display:false},ticks:{color:'#8b92a8'}},y:{grid:{display:false},ticks:{color:'#8b92a8'}}}}
    });

    const ctxMes = document.getElementById('chartMes');
    const mesesLabels = ['Jan','Fev','Mar','Abr','Mai','Jun','Jul','Ago','Set','Out','Nov','Dez'];
    const mesesDados = mesesLabels.map((m, i) => rawData.porMes[i+1] || 0);
    
    new Chart(ctxMes, {
        type:'line', 
        data:{labels:mesesLabels, datasets:[{data:mesesDados, borderColor:'#34d399', backgroundColor:'rgba(52,211,153,0.1)', fill:true, tension:0.4, pointRadius:4}]},
        options:{plugins:{legend:false}, scales:{x:{grid:{display:false},ticks:{color:'#8b92a8'}},y:{grid:{color:'rgba(255,255,255,0.05)'},ticks:{color:'#8b92a8'}}}}
    });
}

function filterAgenda(name, btn){
    if(btn){
        document.querySelectorAll('.f-pill').forEach(p => p.classList.remove('active'));
        btn.classList.add('active');
    }
    const cont = document.getElementById('agenda-list');
    cont.innerHTML = '';
    
    if(!rawData.agenda || rawData.agenda.length === 0){
        cont.innerHTML = '<div style="color:var(--text3); text-align:center; padding:40px">Nenhum prazo encontrado.</div>';
        return;
    }

    rawData.agenda.forEach(day => {
        let procsFiltrados = [];
        if(name === 'Todos'){
            Object.keys(day.advs).forEach(advName => {
                procsFiltrados = procsFiltrados.concat(day.advs[advName]);
            });
        } else {
            // Busca o nome ignorando maiúsculas/minúsculas
            const chave = Object.keys(day.advs).find(k => k.toUpperCase() === name.toUpperCase());
            if(chave) procsFiltrados = day.advs[chave];
        }

        if(procsFiltrados.length > 0){
            let rows = procsFiltrados.map(p => `
                <div class="proc-row">
                    <span class="proc-nome">${p.nome}</span>
                    <div style="font-size:11px; color:var(--text3); font-family:'IBM Plex Mono'">
                        ${p.proc} <span class="badge-tipo">${p.tipo}</span>
                    </div>
                    <div style="font-size:11px; margin-top:6px; color:var(--text2)">
                        <span style="color:var(--c-raf)">●</span> Prazo/Obs: ${p.obs}
                    </div>
                </div>`).join('');
                
            const [y, m, d] = day.date.split('-');
            cont.innerHTML += `
                <div class="day-item">
                    <div class="day-header" onclick="this.nextElementSibling.classList.toggle('open')">
                        <span><b style="color:var(--c-jul)">${d}/${m}/${y}</b></span>
                        <span style="font-family:'IBM Plex Mono'; font-size:11px; color:var(--text3)">${procsFiltrados.length} PROCESSOS ▾</span>
                    </div>
                    <div class="day-content open">${rows}</div>
                </div>`;
        }
    });
}
init();
</script>
</body>
</html>
